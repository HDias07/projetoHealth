<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Pacientes</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Lista de Pacientes</h1>

<a th:href="@{/pacientes/novo}">Novo Paciente</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>CPF</th>
        <th>Email</th>
        <th>Telefone</th>
        <th>Ações</th>
    </tr>

    <tr th:each="paciente : ${pacientes}">
        <td th:text="${paciente.id}"></td>
        <td th:text="${paciente.nome}"></td>
        <td th:text="${paciente.cpf}"></td>
        <td th:text="${paciente.email}"></td>
        <td th:text="${paciente.telefone}"></td>
        <td>
            <a th:href="@{'/pacientes/editar/' + ${paciente.id}}">Editar</a>

            <a th:href="@{'/pacientes/excluir/' + ${paciente.id}}"
               onclick="return confirm('Tem certeza que deseja excluir?')">
                Excluir
            </a>
        </td>
    </tr>
</table>

</body>
</html>
