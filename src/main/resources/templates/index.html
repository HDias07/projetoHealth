<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>HealthConnect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f5f5f0 0%, #eef7e6 100%);
            color: #2d2d2d;
            min-height: 100vh;
        }

        header {
            background-color: #6abf4b;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .marca {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.18);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
        }

        header h1 {
            color: #fff;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        main {
            min-height: calc(100vh - 74px);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .hero {
            width: min(760px, 100%);
            background: #fff;
            border-radius: 18px;
            padding: 48px;
            box-shadow: 0 18px 40px rgba(64, 91, 50, 0.12);
            text-align: center;
        }

        .hero h2 {
            font-size: 2rem;
            color: #305b23;
            margin-bottom: 16px;
        }

        .hero p {
            color: #5f695a;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .acoes {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #6abf4b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s ease;
        }

        .btn:hover { background-color: #57a33a; }

        .btn-secundario {
            background-color: #edf7e8;
            color: #3b6f2e;
            border: 1px solid #c8e6b8;
        }

        .btn-secundario:hover { background-color: #def0d4; }
    </style>
</head>
<body>

<header>
    <div class="marca">HC</div>
    <h1>HealthConnect</h1>
</header>

<main>
    <section class="hero">
        <h2>Sistema de gestao de pacientes</h2>
        <p>
            Cadastre pacientes, atualize contato e consulte os registros de forma simples.
            O projeto agora tambem preserva os dados localmente entre reinicios da aplicacao.
        </p>
        <div class="acoes">
            <a th:href="@{/pacientes}" class="btn">Ver pacientes</a>
            <a th:href="@{/pacientes/novo}" class="btn btn-secundario">Novo cadastro</a>
        </div>
    </section>
</main>

</body>
</html>
